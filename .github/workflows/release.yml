name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag to publish, for example v0.1.0"
        required: true
        type: string
      release_name:
        description: "Release title. Defaults to Setsuna Desktop <tag>."
        required: false
        type: string
      draft:
        description: "Create a draft release when the release does not exist."
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the release as a prerelease when the release does not exist."
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            artifact: macos-arm64
            os: macos-15
            package_script: package:mac:arm64
          - label: macOS Intel
            artifact: macos-x64
            os: macos-15-intel
            package_script: package:mac:x64
          - label: Windows x64
            artifact: windows-x64
            os: windows-2025
            package_script: package:win:x64
          - label: Ubuntu x64
            artifact: ubuntu-x64
            os: ubuntu-24.04
            package_script: package:linux:x64

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 7.33.7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Show runner architecture
        run: node -p "\"platform=\" + process.platform + \" arch=\" + process.arch"

      - name: Install
        run: node scripts/run-with-log.mjs release-logs/install-${{ matrix.artifact }}.log pnpm install --frozen-lockfile

      - name: Typecheck
        run: node scripts/run-with-log.mjs release-logs/typecheck-${{ matrix.artifact }}.log pnpm typecheck

      - name: Test
        run: node scripts/run-with-log.mjs release-logs/test-${{ matrix.artifact }}.log pnpm test

      - name: Package
        run: node scripts/run-with-log.mjs release-logs/package-${{ matrix.artifact }}.log pnpm ${{ matrix.package_script }}

      - name: Collect package outputs
        run: node scripts/collect-release-job-assets.mjs ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: release-upload/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-artifacts/downloaded
          merge-multiple: false

      - name: Prepare release assets
        env:
          RELEASE_TAG: ${{ inputs.tag_name }}
        run: node scripts/prepare-github-release-assets.mjs release-artifacts/downloaded release-artifacts/upload release-artifacts/logs

      - name: Write release notes
        env:
          RELEASE_TAG: ${{ inputs.tag_name }}
          RELEASE_NAME_INPUT: ${{ inputs.release_name }}
        run: |
          set -euo pipefail
          release_name="${RELEASE_NAME_INPUT:-Setsuna Desktop ${RELEASE_TAG}}"
          cat > release-notes.md <<EOF
          ${release_name}

          Assets generated by GitHub Actions:
          - macOS Apple Silicon: unsigned DMG/ZIP, manual install.
          - macOS Intel: unsigned DMG/ZIP, manual install.
          - Windows x64: NSIS installer and ZIP archive.
          - Ubuntu x64: AppImage, deb package, and tar.gz archive.

          See release-manifest.json and SHA256SUMS for artifact metadata and checksums. Build logs are attached as build-logs-v*.zip.
          EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name }}
          RELEASE_NAME_INPUT: ${{ inputs.release_name }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          release_name="${RELEASE_NAME_INPUT:-Setsuna Desktop ${RELEASE_TAG}}"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$release_name" --notes-file release-notes.md
            gh release upload "$RELEASE_TAG" release-artifacts/upload/* --clobber
          else
            flags=(--target "$GITHUB_SHA" --title "$release_name" --notes-file release-notes.md)
            if [[ "$DRAFT" == "true" ]]; then
              flags+=(--draft)
            fi
            if [[ "$PRERELEASE" == "true" ]]; then
              flags+=(--prerelease)
            fi

            gh release create "$RELEASE_TAG" release-artifacts/upload/* "${flags[@]}"
          fi
